<!DOCTYPE html>
<html>
<head>
    <title>Task Wall</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; padding: 20px; background: white; text-align: center; color: black; }
        
        /* The input box */
        #taskInput { 
            width: 90%; max-width: 400px; padding: 15px; border-radius: 8px; 
            border: 1px solid #000; font-size: 16px; margin-bottom: 15px; outline: none;
        }

        /* The Custom Checkbox styling */
        .checkbox-container { display: flex; align-items: center; justify-content: center; margin-bottom: 15px; cursor: pointer; }
        #isWeekly { width: 20px; height: 20px; accent-color: black; cursor: pointer; }

        /* The Button */
        button { 
            background: black; color: white; width: 90%; max-width: 430px; 
            padding: 15px; border-radius: 8px; font-weight: bold; border: none; cursor: pointer; 
        }

        /* The "Wall" Line */
        .wall-line { border: none; border-top: 2px solid black; margin: 30px auto; width: 95%; max-width: 500px; }

        /* The Task Cards */
        .task-card { 
            background: #fff; padding: 15px; margin: 10px auto; border-radius: 8px; 
            max-width: 400px; display: flex; justify-content: space-between; 
            border: 1px solid #eee; box-shadow: 0 2px 5px rgba(0,0,0,0.05); text-align: left;
        }
        .weekly-icon { font-size: 12px; color: #666; margin-left: 10px; border: 1px solid #666; padding: 2px 4px; border-radius: 4px; }
    </style>
</head>
<body>

    <input type="text" id="taskInput" placeholder="Type task here...">
    
    <div class="checkbox-container">
        <input type="checkbox" id="isWeekly">
    </div>

    <button onclick="addTask()">Send to Wall</button>

    <hr class="wall-line">

    <div id="taskList"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Your Firebase Config (Keep this as is)
        const firebaseConfig = {
            apiKey: "AIzaSyBU-ni2K4wpf1Gm6tU5hu08N_8p7GfmB7k",
            authDomain: "todolistido-1234.firebaseapp.com",
            databaseURL: "https://todolistido-1234-default-rtdb.firebaseio.com",
            projectId: "todolistido-1234",
            storageBucket: "todolistido-1234.firebasestorage.app",
            messagingSenderId: "206480575559",
            appId: "1:206480575559:web:02be27c9d1f441a1197562"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const tasksRef = ref(db, 'tasks');

        window.addTask = function() {
            const text = document.getElementById('taskInput').value;
            const weekly = document.getElementById('isWeekly').checked;
            if (text) {
                push(tasksRef, { 
                    text: text, 
                    status: "pending", 
                    weekly: weekly, 
                    dayAdded: new Date().getDay(), // Saves the day (0 is Sunday, 1 is Monday, etc.)
                    timestamp: Date.now() 
                });
                document.getElementById('taskInput').value = '';
                document.getElementById('isWeekly').checked = false;
            }
        };

        // UI Listener: Only shows "pending" tasks
        onValue(tasksRef, (snapshot) => {
            const data = snapshot.val();
            const listDiv = document.getElementById('taskList');
            listDiv.innerHTML = ""; 
            
            for (let id in data) {
                const task = data[id];
                
                // Weekly Logic: If it's a new week and task was done, we could reset it here.
                // For now, we follow your rule: only show pending.
                if(task.status === "pending") {
                    listDiv.innerHTML += `
                        <div class="task-card">
                            <span>${task.text}</span>
                            ${task.weekly ? '<span class="weekly-icon">W</span>' : ''}
                        </div>`;
                }
            }
        });
    </script>
</body>
</html>
