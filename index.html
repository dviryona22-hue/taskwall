<!DOCTYPE html>
<html>
<head>
    <title>Task Wall</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            padding: 20px; 
            padding-top: 80px; /* This pushes the box down from the very top */
            background: white; 
            text-align: center; 
            color: black; 
        }
        
        /* The input box */
        #taskInput { 
            width: 90%; max-width: 400px; padding: 15px; border-radius: 8px; 
            border: 1px solid #000; font-size: 16px; margin-bottom: 15px; outline: none;
        }

        /* The Custom Checkbox styling */
        .checkbox-container { 
            display: flex; align-items: center; justify-content: center; 
            margin-bottom: 15px; 
        }
        #isWeekly { 
            width: 24px; height: 24px; accent-color: black; cursor: pointer; 
            transition: all 0.2s ease;
        }

        /* The Button */
        button { 
            background: black; color: white; width: 90%; max-width: 430px; 
            padding: 15px; border-radius: 8px; font-weight: bold; border: none; cursor: pointer; 
            transition: opacity 0.2s;
        }
        button:active { opacity: 0.7; }

        /* The "Wall" Line */
        .wall-line { border: none; border-top: 2px solid black; margin: 40px auto; width: 95%; max-width: 500px; }

        /* The Task Cards */
        .task-card { 
            background: #fff; padding: 15px; margin: 10px auto; border-radius: 8px; 
            max-width: 400px; display: flex; justify-content: space-between; 
            border: 1px solid #eee; text-align: left;
            font-size: 18px;
        }
        .weekly-label { font-size: 10px; font-weight: bold; color: black; border: 1px solid black; padding: 2px 5px; border-radius: 4px; align-self: center; }
    </style>
</head>
<body>

    <input type="text" id="taskInput" placeholder="type task here...">
    
    <div class="checkbox-container">
        <input type="checkbox" id="isWeekly">
    </div>

    <button onclick="addTask()">Launch</button>

    <hr class="wall-line">

    <div id="taskList"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBU-ni2K4wpf1Gm6tU5hu08N_8p7GfmB7k",
            authDomain: "todolistido-1234.firebaseapp.com",
            databaseURL: "https://todolistido-1234-default-rtdb.firebaseio.com",
            projectId: "todolistido-1234",
            storageBucket: "todolistido-1234.firebasestorage.app",
            messagingSenderId: "206480575559",
            appId: "1:206480575559:web:02be27c9d1f441a1197562"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const tasksRef = ref(db, 'tasks');

        window.addTask = function() {
            const text = document.getElementById('taskInput').value;
            const weekly = document.getElementById('isWeekly').checked;
            if (text) {
                push(tasksRef, { 
                    text: text, 
                    status: "pending", 
                    weekly: weekly, 
                    dayAdded: new Date().getDay(), 
                    timestamp: Date.now() 
                });
                document.getElementById('taskInput').value = '';
                document.getElementById('isWeekly').checked = false;
            }
        };

        onValue(tasksRef, (snapshot) => {
            const data = snapshot.val();
            const listDiv = document.getElementById('taskList');
            listDiv.innerHTML = ""; 
            
            for (let id in data) {
                const task = data[id];
                if(task.status === "pending") {
                    listDiv.innerHTML += `
                        <div class="task-card">
                            <span>${task.text}</span>
                            ${task.weekly ? '<span class="weekly-label">WEEKLY</span>' : ''}
                        </div>`;
                }
            }
        });
    </script>
</body>
</html>
