<!DOCTYPE html>
<html>
<head>
    <title>Task Wall</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            padding: 20px; 
            padding-top: 60px;
            background: white; 
            text-align: center; 
            color: black; 
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        h1 {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 30px;
            letter-spacing: -1px;
        }
        
        #taskInput { 
            width: 90%; max-width: 400px; padding: 15px; border-radius: 8px; 
            border: 1px solid #000; font-size: 16px; margin-bottom: 15px; outline: none;
            user-select: text;
        }

        .checkbox-container { 
            display: flex; align-items: center; justify-content: center; 
            margin-bottom: 15px; 
        }
        #isWeekly { 
            width: 24px; height: 24px; accent-color: black; cursor: pointer; 
        }

        button { 
            background: black; color: white; width: 90%; max-width: 430px; 
            padding: 15px; border-radius: 8px; font-weight: bold; border: none; cursor: pointer; 
            transition: opacity 0.2s;
        }
        button:active { opacity: 0.7; }

        .wall-line { border: none; border-top: 2px solid black; margin: 40px auto; width: 95%; max-width: 500px; }

        .task-card { 
            background: #fff; padding: 15px; margin: 10px auto; border-radius: 8px; 
            max-width: 400px; display: flex; justify-content: space-between; 
            border: 1px solid #eee; text-align: left;
            font-size: 18px;
            transition: transform 0.15s, opacity 0.4s, background-color 0.4s;
            cursor: pointer;
            touch-action: pan-y;
        }

        .task-card.pressing {
            transform: scale(0.92);
            background-color: #ffebee;
            border-color: #ffcdd2;
        }

        .deleting {
            opacity: 0 !important;
            transform: translateX(-100px) !important;
            pointer-events: none;
        }

        .weekly-label { font-size: 10px; font-weight: bold; color: black; border: 1px solid black; padding: 2px 5px; border-radius: 4px; align-self: center; }
    </style>
</head>
<body>

    <h1 id="greeting"></h1>

    <script>
        function updateGreeting() {
            const hour = new Date().getHours();
            let greeting;
            if (hour >= 5 && hour < 12) greeting = "Good morning, Ido";
            else if (hour >= 12 && hour < 17) greeting = "Good afternoon, Ido";
            else if (hour >= 17 && hour < 21) greeting = "Good evening, Ido";
            else greeting = "Good night, Ido";
            document.getElementById('greeting').textContent = greeting;
        }
        updateGreeting();
    </script>

    <input type="text" id="taskInput" placeholder="type task here...">
    
    <div class="checkbox-container">
        <input type="checkbox" id="isWeekly">
    </div>

    <button onclick="addTask()">Launch</button>

    <hr class="wall-line">

    <div id="taskList"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBU-ni2K4wpf1Gm6tU5hu08N_8p7GfmB7k",
            authDomain: "todolistido-1234.firebaseapp.com",
            databaseURL: "https://todolistido-1234-default-rtdb.firebaseio.com",
            projectId: "todolistido-1234",
            storageBucket: "todolistido-1234.firebasestorage.app",
            messagingSenderId: "206480575559",
            appId: "1:206480575559:web:02be27c9d1f441a1197562"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const tasksRef = ref(db, 'tasks');

        let pressTimer;
        let lastTapTime = 0;

        window.handleStart = function(id) {
            const currentTime = new Date().getTime();
            const tapLength = currentTime - lastTapTime;

            if (tapLength < 400 && tapLength > 0) {
                const el = document.getElementById(id);
                el.classList.add('pressing');

                pressTimer = setTimeout(() => {
                    deleteTask(id);
                }, 1500); 
            }
            lastTapTime = currentTime;
        };

        window.handleEnd = function(id) {
            clearTimeout(pressTimer);
            const el = document.getElementById(id);
            if (el) el.classList.remove('pressing');
        };

        function deleteTask(id) {
            const el = document.getElementById(id);
            if (el) {
                el.classList.add('deleting');
                setTimeout(() => {
                    const itemRef = ref(db, 'tasks/' + id);
                    remove(itemRef);
                }, 400);
            }
        }

        window.addTask = function() {
            const text = document.getElementById('taskInput').value;
            const weekly = document.getElementById('isWeekly').checked;
            if (text) {
                push(tasksRef, { 
                    text: text, 
                    status: "pending", 
                    weekly: weekly, 
                    dayAdded: new Date().getDay(), 
                    timestamp: Date.now() 
                });
                document.getElementById('taskInput').value = '';
                document.getElementById('isWeekly').checked = false;
            }
        };

        onValue(tasksRef, (snapshot) => {
            const data = snapshot.val();
            const listDiv = document.getElementById('taskList');
            listDiv.innerHTML = ""; 
            
            for (let id in data) {
                const task = data[id];
                if(task.status === "pending") {
                    const weeklyTag = task.weekly ? '<span class="weekly-label">WEEKLY</span>' : '';
                    
                    const card = document.createElement('div');
                    card.className = 'task-card';
                    card.id = id;
                    card.innerHTML = `<span>${task.text}</span> ${weeklyTag}`;
                    
                    card.onmousedown = () => handleStart(id);
                    card.onmouseup = () => handleEnd(id);
                    card.onmouseleave = () => handleEnd(id);
                    
                    card.ontouchstart = () => handleStart(id);
                    card.ontouchend = () => handleEnd(id);
                    
                    listDiv.appendChild(card);
                }
            }
        });
    </script>
</body>
</html>
