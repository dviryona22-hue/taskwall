<style>
    :root {
        --bg: #0f172a;
        --card: #1e293b;
        --accent: #38bdf8;
        --text: #f8fafc;
    }
    body { 
        font-family: 'Segoe UI', sans-serif; 
        padding: 20px; 
        background: var(--bg); 
        color: var(--text);
        text-align: center; 
    }
    input { 
        width: 90%; 
        max-width: 400px; 
        padding: 15px; 
        background: var(--card);
        border: 1px solid #334155;
        color: white;
        border-radius: 12px; 
        font-size: 16px; 
        margin-bottom: 20px;
    }
    button { 
        background: var(--accent); 
        color: #0f172a; 
        padding: 15px 30px;
        font-weight: bold; 
        border-radius: 12px;
        border: none;
        box-shadow: 0 4px 14px 0 rgba(56, 189, 248, 0.39);
    }
    .task-card { 
        background: var(--card); 
        padding: 15px; 
        margin: 12px auto; 
        border-radius: 12px; 
        max-width: 400px; 
        display: flex; 
        justify-content: space-between; 
        border-left: 4px solid var(--accent);
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }
</style>
